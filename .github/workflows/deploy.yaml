name: Deploy Flask + Nginx App to ASG

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Flask Image
        run: |
          docker build -f ./flask-nginx-app/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Build and Push Nginx Image
        run: |
          docker build -f ./flask-nginx-app/nginx/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest

  # 🚀 New Deployment Step: Tell AWS to cycle the servers
  instance-refresh:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Adjust if your VPC is in a different region

      - name: Start ASG Rolling Update
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "flask-app-asg" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'