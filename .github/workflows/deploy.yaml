name: Deploy Flask + Nginx App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 🐳 Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build and Push Flask Image
      - name: Build and Push Flask Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      # 🐳 Build and Push Nginx Image
      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest

      # 🔑 Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 🚀 Deploy
      - name: Deploy Application to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            mkdir -p /home/${{ secrets.EC2_USER }}/flask-nginx-app
            cd /home/${{ secrets.EC2_USER }}/flask-nginx-app

            docker-compose down || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest

            docker-compose up -d

          EOF